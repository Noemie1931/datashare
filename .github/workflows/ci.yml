name: CI

# Pipeline d'intégration continue : à chaque push sur main et à chaque pull request,
# on construit et on teste automatiquement le back et le front. Les 57 tests servent
# de filet de sécurité : une régression bloque la fusion.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Back-end (build + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: datashare
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Installer les dépendances
        working-directory: backend
        run: npm ci
      - name: Compiler
        working-directory: backend
        run: npm run build
      - name: Tests unitaires + couverture
        working-directory: backend
        run: npm run test:cov
      - name: Tests d'intégration (e2e API)
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USER: postgres
          DB_PASSWORD: postgres123
          DB_NAME: datashare
          JWT_SECRET: ci_secret_for_tests_only
          JWT_EXPIRES_IN: 7d
        run: npm run test:e2e

  frontend:
    name: Front-end (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Installer les dépendances
        working-directory: frontend
        run: npm ci
      - name: Compiler (typecheck + build)
        working-directory: frontend
        run: npm run build
